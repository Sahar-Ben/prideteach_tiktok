<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Event Check-in</title>
  <style>
    :root{--bg:#f7f7ff;--text:#17172f;--muted:#666a80;--card:#fff;--line:#e5e7f5;--pink:#ff4fa3;--purple:#6d5dfc;--blue:#2879ff;--teal:#00a79d;--green:#1aa96b;--orange:#ffb347;--red:#e84b5f;--shadow:0 14px 35px rgba(36,45,84,.14)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(135deg,#fff4fb 0%,#f6f5ff 42%,#effcff 100%);color:var(--text)}
    header{padding:18px 18px 24px;background:linear-gradient(120deg,var(--purple),var(--blue),var(--teal));color:white;box-shadow:var(--shadow)}
    h1{margin:0 0 6px;font-size:30px;letter-spacing:-.7px}.sub{opacity:.92;font-size:15px}.wrap{max-width:1050px;margin:0 auto;padding:18px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.tab{border:0;border-radius:18px;padding:14px 10px;background:rgba(255,255,255,.88);box-shadow:0 7px 18px rgba(0,0,0,.09);font-size:15px;color:#202544}.tab strong{display:block;font-size:28px;margin-bottom:2px}.tab.active{outline:3px solid rgba(255,255,255,.7);transform:translateY(-1px)}.tab.pending.active{background:#fff0cf}.tab.arrived.active{background:#dcfff0}.tab.all.active{background:#e8f1ff}.tab.waiting.active{background:#f2e8ff}
    .toolbar{display:flex;gap:10px;margin:18px 0}.search{flex:1;border:1px solid #d9dcef;border-radius:16px;padding:16px;font-size:17px;background:white;box-shadow:0 7px 18px rgba(36,45,84,.06)}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer}.btn.primary{background:var(--purple);color:white}.btn.green{background:var(--green);color:white}.btn.red{background:#ffe3e8;color:#b61e35}.btn.light{background:#eef1ff;color:#333a68}.btn.blue{background:#e8f1ff;color:#164fb8}.btn:active{transform:scale(.98)}
    .panel{background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.panel h2{margin:0 0 12px;font-size:20px}.hint{color:var(--muted);font-size:14px;line-height:1.35}.list{display:grid;gap:10px}.person{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 5px 15px rgba(36,45,84,.07)}.person.arrived{background:#f0fff7;border-color:#bdf1d6}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:white;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple))}.info{flex:1;min-width:0}.name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.phone{color:var(--muted);font-size:14px;margin-top:2px}.actions{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;margin-top:6px}.badge.pending{background:#fff0cf;color:#74430a}.badge.arrived{background:#d9ffed;color:#087245}.badge.waiting{background:#f2e8ff;color:#5f2dbd}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:9px}.form input{border:1px solid #d9dcef;border-radius:14px;padding:13px;font-size:16px}.empty{text-align:center;color:var(--muted);padding:28px}.error{background:#fff1f3;color:#a3152a;border:1px solid #ffc9d1;border-radius:16px;padding:12px;margin-bottom:12px;display:none}.success{background:#edfff7;color:#087245;border:1px solid #bdf1d6;border-radius:16px;padding:12px;margin-bottom:12px;display:none}
    @media(max-width:760px){.tabs{grid-template-columns:repeat(2,1fr)}.toolbar{flex-direction:column}.person{align-items:flex-start}.actions{width:100%;justify-content:flex-start}.form{grid-template-columns:1fr}.wrap{padding:12px}h1{font-size:26px}}
  </style>
</head>
<body>
<header><div class="wrap" style="padding-top:0;padding-bottom:0"><h1>Event Check-in</h1><div class="sub" id="loadStatus">Connect this page to your Google Apps Script URL.</div><div class="tabs"><button class="tab pending active" data-tab="pending"><strong id="pendingCount">0</strong>Pending</button><button class="tab arrived" data-tab="arrived"><strong id="arrivedCount">0</strong>Arrived</button><button class="tab all" data-tab="all"><strong id="allCount">0</strong>All</button><button class="tab waiting" data-tab="waiting"><strong id="waitingCount">0</strong>Waiting list</button></div></div></header>
<main class="wrap"><div id="err" class="error"></div><div id="ok" class="success"></div><div class="toolbar"><input id="search" class="search" placeholder="Search by name or phone"/><button class="btn light" id="refreshBtn">Refresh</button></div><section class="panel" id="mainPanel"><h2 id="sectionTitle">Pending</h2><div id="list" class="list"></div></section><section class="panel" id="waitingPanel" style="display:none"><h2>Waiting list</h2><form id="addForm" class="form"><input id="newName" placeholder="Full name" required><input id="newPhone" placeholder="Phone"><button class="btn primary" type="submit">Add</button></form><div style="height:12px"></div><div id="waitingList" class="list"></div></section><p class="hint">Check-ins are written back to Google Sheets through Apps Script. Waiting list is saved on this device unless you move someone to the main list.</p></main>
<script>
  // IMPORTANT: paste your Apps Script Web App URL here after deployment.
  const API_URL = "https://script.google.com/macros/s/AKfycbyIuBVv5VLNrZquMMPv-w81V9tJ0SXd4qD8Ym6veAvi69iwhb-fqL0LWf179fp33yzW/exec";
  const STORAGE_KEY = "event-checkin-waiting-v1";
  let people = [];
  let waiting = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let activeTab = "pending";
  const $ = id => document.getElementById(id);
  const norm = v => String(v || "").trim();
  const sortByName = arr => arr.sort((a,b)=>norm(a.name).localeCompare(norm(b.name), undefined, {sensitivity:"base"}));
  function showError(msg){$("err").textContent=msg;$("err").style.display="block";setTimeout(()=>$("err").style.display="none",7000)}
  function showOk(msg){$("ok").textContent=msg;$("ok").style.display="block";setTimeout(()=>$("ok").style.display="none",2500)}
  async function api(payload){
    if(!API_URL || API_URL.includes("PASTE_")) throw new Error("Apps Script URL is missing. Paste it inside index.html first.");
    const res = await fetch(API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload)});
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || "Unknown server error");
    return data;
  }
  async function loadPeople(){
    try{ $("loadStatus").textContent="Loading from Google Sheets..."; const data = await api({action:"list"}); people = sortByName((data.people||[]).map(p=>({row:p.row, name:norm(p.name), phone:norm(p.phone), arrived:!!p.arrived})).filter(p=>p.name)); $("loadStatus").textContent=`Loaded ${people.length} people from Google Sheets.`; render(); }
    catch(e){ showError(e.message); $("loadStatus").textContent="Could not load from Google Sheets."; render(); }
  }
  async function setArrived(person, arrived){
    const old = person.arrived; person.arrived = arrived; render();
    try{ await api({action:"checkin", row:person.row, arrived}); showOk(`${person.name} updated in Google Sheets.`); await loadPeople(); }
    catch(e){ person.arrived = old; render(); showError(e.message); }
  }
  async function addToMain(person){
    try{ const data = await api({action:"add", name:person.name, phone:person.phone}); waiting = waiting.filter(w=>w.id!==person.id); saveWaiting(); showOk(`${person.name} moved to main list.`); await loadPeople(); activeTab="all"; render(); }
    catch(e){ showError(e.message); }
  }
  function saveWaiting(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(waiting)); }
  function filteredPeople(){ const q=norm($("search").value).toLowerCase(); let arr=people.filter(p=> activeTab==="pending" ? !p.arrived : activeTab==="arrived" ? p.arrived : activeTab==="all"); if(q) arr=arr.filter(p=>(p.name+" "+p.phone).toLowerCase().includes(q)); return sortByName(arr); }
  function personCard(p){ const div=document.createElement("div"); div.className="person"+(p.arrived?" arrived":""); div.innerHTML=`<div class="avatar">${norm(p.name).charAt(0).toUpperCase()}</div><div class="info"><div class="name"></div><div class="phone"></div><span class="badge ${p.arrived?"arrived":"pending"}">${p.arrived?"Arrived":"Pending"}</span></div><div class="actions"></div>`; div.querySelector(".name").textContent=p.name; div.querySelector(".phone").textContent=p.phone||"No phone"; const actions=div.querySelector(".actions"); const b=document.createElement("button"); b.className=p.arrived?"btn light":"btn green"; b.textContent=p.arrived?"Undo":"Arrived"; b.onclick=()=>setArrived(p,!p.arrived); actions.appendChild(b); if(p.phone){ const c=document.createElement("button"); c.className="btn blue"; c.textContent="Copy"; c.onclick=async()=>{await navigator.clipboard.writeText(p.phone); showOk("Phone copied")}; actions.appendChild(c); const a=document.createElement("a"); a.className="btn light"; a.textContent="Call"; a.href="tel:"+p.phone.replace(/[^+\d]/g,""); actions.appendChild(a);} return div; }
  function waitingCard(p){ const div=document.createElement("div"); div.className="person"; div.innerHTML=`<div class="avatar">${norm(p.name).charAt(0).toUpperCase()}</div><div class="info"><div class="name"></div><div class="phone"></div><span class="badge waiting">Waiting list</span></div><div class="actions"></div>`; div.querySelector(".name").textContent=p.name; div.querySelector(".phone").textContent=p.phone||"No phone"; const actions=div.querySelector(".actions"); const m=document.createElement("button"); m.className="btn green"; m.textContent="Move to list"; m.onclick=()=>addToMain(p); actions.appendChild(m); const d=document.createElement("button"); d.className="btn red"; d.textContent="Delete"; d.onclick=()=>{waiting=waiting.filter(w=>w.id!==p.id); saveWaiting(); render()}; actions.appendChild(d); return div; }
  function render(){ $("pendingCount").textContent=people.filter(p=>!p.arrived).length; $("arrivedCount").textContent=people.filter(p=>p.arrived).length; $("allCount").textContent=people.length; $("waitingCount").textContent=waiting.length; document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===activeTab)); const isWaiting=activeTab==="waiting"; $("mainPanel").style.display=isWaiting?"none":"block"; $("waitingPanel").style.display=isWaiting?"block":"none"; $("sectionTitle").textContent=activeTab.charAt(0).toUpperCase()+activeTab.slice(1); if(!isWaiting){ const list=$("list"); list.innerHTML=""; const arr=filteredPeople(); if(!arr.length){list.innerHTML='<div class="empty">No people found</div>'} else arr.forEach(p=>list.appendChild(personCard(p))); } else { const q=norm($("search").value).toLowerCase(); const list=$("waitingList"); list.innerHTML=""; let arr=sortByName(waiting.slice()); if(q) arr=arr.filter(p=>(p.name+" "+p.phone).toLowerCase().includes(q)); if(!arr.length){list.innerHTML='<div class="empty">No waiting list people yet</div>'} else arr.forEach(p=>list.appendChild(waitingCard(p))); } }
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{activeTab=t.dataset.tab; render()}); $("search").addEventListener("input",render); $("refreshBtn").onclick=loadPeople; $("addForm").onsubmit=e=>{e.preventDefault(); waiting.push({id:Date.now()+"", name:norm($("newName").value), phone:norm($("newPhone").value)}); saveWaiting(); e.target.reset(); render();};
  loadPeople();
</script>
</body>
</html>
