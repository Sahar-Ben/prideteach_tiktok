<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PrideTech TikTok Check-in</title>
  <style>
    :root{--bg:#f7f7ff;--text:#17172f;--muted:#666a80;--card:#fff;--line:#e5e7f5;--pink:#ff4fa3;--purple:#6d5dfc;--blue:#2879ff;--teal:#00a79d;--green:#1aa96b;--orange:#ffb347;--red:#e84b5f;--shadow:0 14px 35px rgba(36,45,84,.14)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(135deg,#fff4fb 0%,#f6f5ff 42%,#effcff 100%);color:var(--text)}
    header{position:relative;overflow:hidden;padding:18px 18px 24px;background:radial-gradient(circle at 12% 18%,rgba(255,255,255,.35),transparent 22%),linear-gradient(120deg,#111827 0%,#6d5dfc 36%,#00f2ea 72%,#ff0050 100%);color:white;box-shadow:var(--shadow)}
    .wrap{max-width:1050px;margin:0 auto;padding:18px} h1{margin:0 0 6px;font-size:30px;letter-spacing:-.7px}.sub{opacity:.92;font-size:15px}.brandRow{display:flex;align-items:center;gap:12px}.tiktokIcon{width:54px;height:54px;border-radius:18px;background:#111827;display:grid;place-items:center;box-shadow:7px 7px 0 rgba(0,242,234,.85),-7px -7px 0 rgba(255,0,80,.75);font-size:31px;transform:rotate(-3deg)}.sparkle{position:absolute;font-size:26px;opacity:.75}.sparkle.s1{right:30px;top:24px}.sparkle.s2{right:112px;bottom:26px}.sparkle.s3{left:34px;bottom:16px}
    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:18px}.tab{border:0;border-radius:18px;padding:14px 10px;background:rgba(255,255,255,.92);box-shadow:0 7px 18px rgba(0,0,0,.11);font-size:15px;color:#202544;position:relative;overflow:hidden}.tab:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,#ff0050,#00f2ea)}.tab strong{display:block;font-size:28px;margin-bottom:2px}.tab.active{outline:3px solid rgba(255,255,255,.7);transform:translateY(-1px)}.tab.pending.active{background:#fff0cf}.tab.cancel.active{background:#ffe3e8}.tab.arrived.active{background:#dcfff0}.tab.all.active{background:#e8f1ff}.tab.waiting.active{background:#f2e8ff}
    .toolbar{display:flex;gap:10px;margin:18px 0}.search{flex:1;border:1px solid #d9dcef;border-radius:16px;padding:16px;font-size:17px;background:white;box-shadow:0 7px 18px rgba(36,45,84,.06)}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.primary{background:var(--purple);color:white}.btn.green{background:var(--green);color:white}.btn.red{background:#ffe3e8;color:#b61e35}.btn.light{background:#eef1ff;color:#333a68}.btn.blue{background:#e8f1ff;color:#164fb8}.btn:active{transform:scale(.98)}
    .panel{background:rgba(255,255,255,.86);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.panel h2{margin:0 0 12px;font-size:20px}.hint{color:var(--muted);font-size:14px;line-height:1.35}.list{display:grid;gap:10px}.person{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 5px 15px rgba(36,45,84,.07)}.person.arrived{background:#f0fff7;border-color:#bdf1d6}.person.canceled{background:#fff1f3;border-color:#ffc9d1}.person.waiting{background:#fbf7ff;border-color:#dfccff}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:white;font-weight:800;background:linear-gradient(135deg,#ff0050,#6d5dfc,#00f2ea);box-shadow:4px 4px 0 rgba(0,242,234,.3),-4px -4px 0 rgba(255,0,80,.25)}.info{flex:1;min-width:0}.name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.phone{color:var(--muted);font-size:14px;margin-top:2px}.notePreview{color:#565b72;font-size:13px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.time{color:#087245;font-size:13px;font-weight:800;margin-top:4px}.actions{display:flex;gap:8px;align-items:center;justify-content:flex-end}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;margin-top:6px}.badge.pending{background:#fff0cf;color:#74430a}.badge.arrived{background:#d9ffed;color:#087245}.badge.canceled{background:#ffe3e8;color:#b61e35}.badge.waiting{background:#f2e8ff;color:#5f2dbd}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:9px}.form input{border:1px solid #d9dcef;border-radius:14px;padding:13px;font-size:16px}.empty{text-align:center;color:var(--muted);padding:28px}.error{background:#fff1f3;color:#a3152a;border:1px solid #ffc9d1;border-radius:16px;padding:12px;margin-bottom:12px;display:none}.success{background:#edfff7;color:#087245;border:1px solid #bdf1d6;border-radius:16px;padding:12px;margin-bottom:12px;display:none}
    .menuWrap{position:relative}.dots{width:42px;height:42px;border-radius:14px;border:1px solid #d9dcef;background:white;font-size:22px;font-weight:900;color:#38405f}.menu{position:absolute;right:0;top:48px;z-index:20;background:white;border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 45px rgba(36,45,84,.2);padding:8px;display:none;min-width:200px}.menu.open{display:grid;gap:6px}.menu .btn{width:100%;justify-content:flex-start}.modal{position:fixed;inset:0;background:rgba(17,24,39,.45);display:none;align-items:center;justify-content:center;z-index:99;padding:18px}.modalBox{background:white;border-radius:24px;max-width:460px;width:100%;padding:22px;box-shadow:0 25px 70px rgba(0,0,0,.28);border:1px solid #f0d8e8}.modalBox h3{margin:0 0 8px;font-size:22px}.modalBox p{margin:0 0 16px;color:var(--muted);line-height:1.35}.modalActions{display:flex;gap:10px;justify-content:flex-end}.noteArea{width:100%;min-height:140px;border:1px solid #d9dcef;border-radius:16px;padding:14px;font-size:16px;resize:vertical;margin:10px 0 16px;font-family:inherit}.mainCta{min-width:94px}
    @media(max-width:760px){.tabs{grid-template-columns:repeat(2,1fr)}.toolbar{flex-direction:column}.person{align-items:flex-start}.actions{margin-left:auto}.form{grid-template-columns:1fr}.wrap{padding:12px}h1{font-size:26px}.menu{right:0}.mainCta{min-width:86px}}
  </style>
</head>
<body>
<header><span class="sparkle s1">♪</span><span class="sparkle s2">✦</span><span class="sparkle s3">♫</span><div class="wrap" style="padding-top:0;padding-bottom:0"><div class="brandRow"><div class="tiktokIcon">♪</div><div><h1>PrideTech TikTok Check-in</h1><div class="sub" id="loadStatus">Loading event list...</div></div></div><div class="tabs"><button class="tab pending active" data-tab="pending"><strong id="pendingCount">0</strong>Pending</button><button class="tab cancel" data-tab="cancel"><strong id="cancelCount">0</strong>Canceled</button><button class="tab arrived" data-tab="arrived"><strong id="arrivedCount">0</strong>Arrived</button><button class="tab all" data-tab="all"><strong id="allCount">0</strong>All</button><button class="tab waiting" data-tab="waiting"><strong id="waitingCount">0</strong>Waiting list</button></div></div></header>
<main class="wrap"><div id="err" class="error"></div><div id="ok" class="success"></div><div class="toolbar"><input id="search" class="search" placeholder="Search by name or phone"/><button class="btn light" id="refreshBtn">Refresh</button></div><section class="panel" id="mainPanel"><h2 id="sectionTitle">Pending</h2><div id="list" class="list"></div></section><section class="panel" id="waitingPanel" style="display:none"><h2>Waiting list</h2><form id="addForm" class="form"><input id="newName" placeholder="Full name" required><input id="newPhone" placeholder="Phone"><button class="btn primary" type="submit">Add</button></form><div style="height:12px"></div><div id="waitingList" class="list"></div></section><p class="hint">Canceled = anyone marked Declined in column G. Moving back to waiting list updates Google Sheets and clears arrived status.</p></main>
<div id="deleteModal" class="modal"><div class="modalBox"><h3>Delete from waiting list?</h3><p id="deleteText"></p><div class="modalActions"><button class="btn light" id="cancelDelete">Cancel</button><button class="btn red" id="confirmDelete">Delete</button></div></div></div>
<div id="moveModal" class="modal"><div class="modalBox"><h3>Move to waiting list?</h3><p id="moveText"></p><div class="modalActions"><button class="btn light" id="cancelMove">Cancel</button><button class="btn primary" id="confirmMove">Move</button></div></div></div>
<div id="noteModal" class="modal"><div class="modalBox"><h3 id="noteTitle">Notes</h3><p id="noteHelp">Write a note for this person.</p><textarea id="noteText" class="noteArea" placeholder="Write a note..."></textarea><div class="modalActions"><button class="btn light" id="cancelNote">Cancel</button><button class="btn primary" id="saveNote">Save note</button></div></div></div>
<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbycZaJ0zeZvKRpN1IgghoTltS00-yYP3b-rPaVnw0CQ73_n0Iks4yqIfvYuVzpLVrHh/exec";
  const STORAGE_KEY = "event-checkin-waiting-v4";
  let people = [];
  let localWaiting = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let activeTab = "pending";
  let pendingDeleteId = null;
  let pendingMovePerson = null;
  let pendingNote = null;
  const $ = id => document.getElementById(id);
  const norm = v => String(v || "").trim();
  const sortByName = arr => arr.sort((a,b)=>norm(a.name).localeCompare(norm(b.name), undefined, {sensitivity:"base"}));
  const serverWaiting = () => people.filter(p => p.waiting && !p.canceled);
  const visibleMain = () => people.filter(p => !p.waiting);
  const allWaiting = () => sortByName(serverWaiting().concat(localWaiting));
  function showError(msg){$("err").textContent=msg;$("err").style.display="block";setTimeout(()=>$("err").style.display="none",8000)}
  function showOk(msg){$("ok").textContent=msg;$("ok").style.display="block";setTimeout(()=>$("ok").style.display="none",2500)}
  async function api(payload){
    const res = await fetch(API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload)});
    const text = await res.text();
    let data; try{ data = JSON.parse(text); } catch(e){ throw new Error("Could not read server response"); }
    if(!data.ok) throw new Error(data.error || "Unknown error");
    return data;
  }
  async function loadPeople(){
    $("loadStatus").textContent="Loading event list...";
    try{ const data = await api({action:"list"}); people = sortByName(data.people || []); $("loadStatus").textContent = `${people.length} people loaded`; render(); }
    catch(e){ showError(e.message); $("loadStatus").textContent="Could not load list"; render(); }
  }
  async function setArrived(person, arrived){ const old=person.arrived; const oldTime=person.checkedInAt; person.arrived=arrived; person.checkedInAt=arrived?new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}):""; render(); try{ await api({action:"checkin", row:person.row, arrived}); showOk(arrived?`${person.name} checked in.`:`${person.name} moved back to pending.`); await loadPeople(); } catch(e){ person.arrived=old; person.checkedInAt=oldTime; render(); showError(e.message); } }
  async function addToMain(person){
    try{
      if(person.row){ await api({action:"moveToMain", row:person.row}); }
      else { await api({action:"add", name:person.name, phone:person.phone, note:person.note || ""}); localWaiting = localWaiting.filter(w=>w.id!==person.id); saveLocalWaiting(); }
      showOk(`${person.name} moved to main list.`); await loadPeople(); render();
    } catch(e){ showError(e.message); }
  }
  async function moveBackToWaiting(person){
    closeMovePopup();
    try{ await api({action:"moveToWaiting", row:person.row}); showOk(`${person.name} moved to waiting list.`); await loadPeople(); activeTab="waiting"; render(); }
    catch(e){ showError(e.message); }
  }
  async function saveMainNote(person, note){ const old=person.note; person.note=note; render(); try{ await api({action:"note", row:person.row, note}); showOk("Note saved in Google Sheets."); await loadPeople(); } catch(e){ person.note=old; render(); showError(e.message); } }
  function saveLocalWaiting(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(localWaiting)); }
  function filteredPeople(){ const q=norm($("search").value).toLowerCase(); let base=visibleMain(); let arr=base.filter(p=> activeTab==="pending" ? (!p.arrived && !p.canceled) : activeTab==="cancel" ? p.canceled : activeTab==="arrived" ? (p.arrived && !p.canceled) : true); if(q) arr=arr.filter(p=>(p.name+" "+p.phone+" "+(p.note||"")+" "+(p.status||"")).toLowerCase().includes(q)); return sortByName(arr); }
  function closeAllMenus(){ document.querySelectorAll(".menu.open").forEach(m=>m.classList.remove("open")); }
  function makeMenu(buttons){ const wrap=document.createElement("div"); wrap.className="menuWrap"; const dots=document.createElement("button"); dots.className="dots"; dots.type="button"; dots.textContent="⋯"; const menu=document.createElement("div"); menu.className="menu"; buttons.forEach(b=>menu.appendChild(b)); dots.onclick=(e)=>{e.stopPropagation(); const wasOpen=menu.classList.contains("open"); closeAllMenus(); if(!wasOpen) menu.classList.add("open");}; wrap.appendChild(dots); wrap.appendChild(menu); return wrap; }
  function menuButton(label, cls, fn){ const b=document.createElement("button"); b.className="btn "+cls; b.type="button"; b.textContent=label; b.onclick=()=>{closeAllMenus(); fn();}; return b; }
  function personCard(p){
    const div=document.createElement("div"); div.className="person"+(p.canceled?" canceled":(p.arrived?" arrived":""));
    const badgeClass=p.canceled?"canceled":(p.arrived?"arrived":"pending"); const badgeText=p.canceled?"Canceled":(p.arrived?"Arrived":"Pending");
    div.innerHTML=`<div class="avatar">${norm(p.name).charAt(0).toUpperCase()}</div><div class="info"><div class="name"></div><div class="phone"></div><div class="notePreview"></div><div class="time"></div><span class="badge ${badgeClass}">${badgeText}</span></div><div class="actions"></div>`;
    div.querySelector(".name").textContent=p.name; div.querySelector(".phone").textContent=p.phone||"No phone"; div.querySelector(".notePreview").textContent=p.note?"Note: "+p.note:(p.canceled&&p.status?"Status: "+p.status:""); div.querySelector(".time").textContent=p.arrived&&p.checkedInAt?"Arrived at "+p.checkedInAt:"";
    const actions=div.querySelector(".actions"); if(!p.canceled){ const arrive=document.createElement("button"); arrive.className=p.arrived?"btn light mainCta":"btn green mainCta"; arrive.textContent=p.arrived?"Undo":"Arrived"; arrive.onclick=()=>setArrived(p,!p.arrived); actions.appendChild(arrive); }
    const buttons=[]; if(p.phone){ buttons.push(menuButton("Copy phone", "blue", async()=>{await navigator.clipboard.writeText(p.phone); showOk("Phone copied")})); const call=document.createElement("a"); call.className="btn light"; call.textContent="Call"; call.href="tel:"+p.phone.replace(/[^+\d]/g,""); call.onclick=()=>closeAllMenus(); buttons.push(call); }
    buttons.push(menuButton("Notes", "primary", ()=>openNotePopup("main", p))); if(!p.canceled) buttons.push(menuButton("Move to waiting", "red", ()=>openMovePopup(p))); actions.appendChild(makeMenu(buttons)); return div;
  }
  function waitingCard(p){
    const isLocal=!p.row; const div=document.createElement("div"); div.className="person waiting"; div.innerHTML=`<div class="avatar">${norm(p.name).charAt(0).toUpperCase()}</div><div class="info"><div class="name"></div><div class="phone"></div><div class="notePreview"></div><span class="badge waiting">Waiting list</span></div><div class="actions"></div>`;
    div.querySelector(".name").textContent=p.name; div.querySelector(".phone").textContent=p.phone||"No phone"; div.querySelector(".notePreview").textContent=p.note?"Note: "+p.note:(isLocal?"Added manually on this device":"Saved in Google Sheets");
    const actions=div.querySelector(".actions"); const m=document.createElement("button"); m.className="btn green mainCta"; m.textContent="Move to list"; m.onclick=()=>addToMain(p); actions.appendChild(m);
    const buttons=[]; if(p.phone){ buttons.push(menuButton("Copy phone", "blue", async()=>{await navigator.clipboard.writeText(p.phone); showOk("Phone copied")})); const call=document.createElement("a"); call.className="btn light"; call.textContent="Call"; call.href="tel:"+p.phone.replace(/[^+\d]/g,""); call.onclick=()=>closeAllMenus(); buttons.push(call); }
    buttons.push(menuButton("Notes", "primary", ()=>openNotePopup(isLocal?"localWaiting":"serverWaiting", p))); if(isLocal) buttons.push(menuButton("Delete", "red", ()=>openDeletePopup(p))); actions.appendChild(makeMenu(buttons)); return div;
  }
  function openMovePopup(p){ pendingMovePerson=p; $("moveText").textContent=`Move ${p.name} from the main list back to the waiting list? This will update Google Sheets and clear their arrived status.`; $("moveModal").style.display="flex"; }
  function closeMovePopup(){ pendingMovePerson=null; $("moveModal").style.display="none"; }
  function confirmMoveBack(){ if(pendingMovePerson) moveBackToWaiting(pendingMovePerson); else closeMovePopup(); }
  function openDeletePopup(p){ pendingDeleteId=p.id; $("deleteText").textContent=`Delete ${p.name} from the waiting list? This only deletes people added manually on this device.`; $("deleteModal").style.display="flex"; }
  function closeDeletePopup(){ pendingDeleteId=null; $("deleteModal").style.display="none"; }
  function confirmDeleteWaiting(){ if(!pendingDeleteId) return closeDeletePopup(); localWaiting=localWaiting.filter(w=>w.id!==pendingDeleteId); saveLocalWaiting(); closeDeletePopup(); render(); showOk("Removed from waiting list."); }
  function openNotePopup(type, person){ pendingNote={type,person}; $("noteTitle").textContent=`Notes for ${person.name}`; $("noteHelp").textContent=type==="localWaiting"?"This note is saved on this device until you move the person to the main list.":"This note will be saved in Google Sheets."; $("noteText").value=person.note||""; $("noteModal").style.display="flex"; setTimeout(()=>$("noteText").focus(),50); }
  function closeNotePopup(){ pendingNote=null; $("noteModal").style.display="none"; }
  async function confirmSaveNote(){ if(!pendingNote) return closeNotePopup(); const note=$("noteText").value.trim(); const {type,person}=pendingNote; closeNotePopup(); if(type==="localWaiting"){ person.note=note; saveLocalWaiting(); render(); showOk("Note saved for waiting list."); } else await saveMainNote(person,note); }
  function render(){ const main=visibleMain(); $("pendingCount").textContent=main.filter(p=>!p.arrived&&!p.canceled).length; $("cancelCount").textContent=main.filter(p=>p.canceled).length; $("arrivedCount").textContent=main.filter(p=>p.arrived&&!p.canceled).length; $("allCount").textContent=main.length; $("waitingCount").textContent=allWaiting().length; document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===activeTab)); const isWaiting=activeTab==="waiting"; $("mainPanel").style.display=isWaiting?"none":"block"; $("waitingPanel").style.display=isWaiting?"block":"none"; const labels={pending:"Pending",cancel:"Canceled",arrived:"Arrived",all:"All"}; $("sectionTitle").textContent=labels[activeTab]||activeTab; if(!isWaiting){ const list=$("list"); list.innerHTML=""; const arr=filteredPeople(); if(!arr.length) list.innerHTML='<div class="empty">No people found</div>'; else arr.forEach(p=>list.appendChild(personCard(p))); } else { const q=norm($("search").value).toLowerCase(); const list=$("waitingList"); list.innerHTML=""; let arr=allWaiting(); if(q) arr=arr.filter(p=>(p.name+" "+p.phone+" "+(p.note||"")).toLowerCase().includes(q)); if(!arr.length) list.innerHTML='<div class="empty">No waiting list people yet</div>'; else arr.forEach(p=>list.appendChild(waitingCard(p))); } }
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{activeTab=t.dataset.tab; closeAllMenus(); render()}); $("search").addEventListener("input",render); $("refreshBtn").onclick=loadPeople; $("addForm").onsubmit=e=>{e.preventDefault(); localWaiting.push({id:Date.now()+"", name:norm($("newName").value), phone:norm($("newPhone").value), note:""}); saveLocalWaiting(); e.target.reset(); render();}; $("cancelDelete").onclick=closeDeletePopup; $("confirmDelete").onclick=confirmDeleteWaiting; $("deleteModal").addEventListener("click",e=>{if(e.target.id==="deleteModal") closeDeletePopup();}); $("cancelMove").onclick=closeMovePopup; $("confirmMove").onclick=confirmMoveBack; $("moveModal").addEventListener("click",e=>{if(e.target.id==="moveModal") closeMovePopup();}); $("cancelNote").onclick=closeNotePopup; $("saveNote").onclick=confirmSaveNote; $("noteModal").addEventListener("click",e=>{if(e.target.id==="noteModal") closeNotePopup();}); document.addEventListener("click", closeAllMenus); loadPeople();
</script>
</body>
</html>
